set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g status-position top

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Custom key bindings for navigating left/right
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n '♠' if-shell "$is_vim" { send-keys '♠' } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n '♤' if-shell "$is_vim" { send-keys '♤' } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }
bind-key -n '♡' if-shell "$is_vim" { send-keys '♡' } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n '♢' if-shell "$is_vim" { send-keys '♢' } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }

# # Edit values if you use custom resize_count variables (SWE layout)
bind-key -n '˛' if-shell "$is_vim" "send-keys M-h"  "resize-pane -L 5"
bind-key -n '√' if-shell "$is_vim" "send-keys M-j"  "resize-pane -D 5"
bind-key -n 'ª' if-shell "$is_vim" "send-keys M-k"  "resize-pane -U 5"
bind-key -n 'ﬁ' if-shell "$is_vim" "send-keys M-l"  "resize-pane -R 5"


# # # Edit values if you use custom resize_count variables (US layout)
bind-key -n '˙' if-shell "$is_vim" "send-keys M-h"  "resize-pane -L 5"
bind-key -n '∆' if-shell "$is_vim" "send-keys M-j"  "resize-pane -D 5"
bind-key -n '˚' if-shell "$is_vim" "send-keys M-k"  "resize-pane -U 5"
bind-key -n '¬' if-shell "$is_vim" "send-keys M-l"  "resize-pane -R 5"


bind -r m resize-pane -Z
bind Space last-window
bind C-l send-keys 'C-l'

# swap pane with neighbor (prefix + h/j/k/l)
bind -r h swap-pane -t '{left-of}'
bind -r j swap-pane -t '{down-of}'
bind -r k swap-pane -t '{up-of}'
bind -r l swap-pane -t '{right-of}'

# join/break panes across windows
# workflow: prefix+m on source pane to mark, switch window, prefix+@ to pull it in
bind @ join-pane -s '{marked}'
bind B break-pane
bind J command-prompt -p "join pane from:" "join-pane -s '%%'"

# popups (floating overlay, prefix + key)
bind D display-popup -E -w 50% -h 50% -d "#{pane_current_path}" lazydocker
bind K display-popup -E -w 50% -h 50% -d "#{pane_current_path}" k9s
bind Q display-popup -E -w 50% -h 50% -d "#{pane_current_path}" lazysql
bind Y display-popup -E -w 50% -h 50% -d "#{pane_current_path}" yazi
bind T display-popup -E -w 50% -h 50% -d "#{pane_current_path}"

set -g mouse on
set -g detach-on-destroy off
set -g set-clipboard on
set -g status-interval 15
set -g aggressive-resize on
set -g wrap-search off

bind -n ♥ switch-client -p
bind -n C-s switch-client -n

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi

# Enter copy mode with prefix + v
bind-key v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

unbind-key C-j
unbind-key C-k
bind-key -T copy-mode-vi C-j send-keys -X -N 7 cursor-down
bind-key -T copy-mode-vi C-k send-keys -X -N 7 cursor-up

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 0

# scrollback buffer
set -g history-limit 50000

# message display time
set -g display-time 2000

# Enable focus events for neovim integration
set -g focus-events on

# Pane border styling (catppuccin)
set -g pane-active-border-style 'fg=#cba6f7'  # mauve
set -g pane-border-style 'fg=#313244'          # surface0

# Dim inactive panes
set -g window-style 'fg=#6c7086,bg=#181825'        # overlay0, mantle (darker)
set -g window-active-style 'fg=#cdd6f4,bg=#1e1e2e' # text, base

# list of tmux plugins
set -g @plugin 'catppuccin/tmux'

# Catppuccin status bar config - show pane info
set -g @catppuccin_status_modules_right "pane session"
set -g @catppuccin_pane_text "#{pane_current_command}"

# session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
